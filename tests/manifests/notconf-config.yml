
---
apiVersion: config.sdcio.dev/v1alpha1
kind: ConfigSet
metadata:
  name: customer
  namespace: notconf
spec:
  target:
    targetSelector:
      matchLabels:
        sdcio.dev/target-type:  sros
  priority: 5
  config:
  - path: /
    value:
      configure:
        service:
          customer:
            - customer-name: "1"
              customer-id: 1
            - customer-name: "2"
              customer-id: 2
