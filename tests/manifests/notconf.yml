---
apiVersion: v1
kind: Namespace
metadata:
  name: notconf

---
apiVersion: v1
kind: Service
metadata:
  name: notconf
  namespace: notconf
spec:
  type: ClusterIP
  selector:
    app: notconf
  ports:
    - name: netconf
      protocol: TCP
      port: 830
      targetPort: 830

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notconf
  namespace: notconf
  labels:
    app: notconf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notconf
  template:
    metadata:
      labels:
        app: notconf
    spec:
      containers:
      - name: notconf
        image: ghcr.io/notconf/notconf-sros:22.2
        imagePullPolicy: IfNotPresent
        ports:
        - name: netconf
          containerPort: 830
          protocol: TCP
