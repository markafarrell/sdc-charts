# Source: sdc/templates/statefulset-data-server.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: data-server-controller
  namespace: default
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/component: data-server-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      
      app.kubernetes.io/name: sdc
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: data-server-controller
  template:
    metadata:
      labels:
        
        app.kubernetes.io/name: sdc
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: data-server-controller
        sdcio.dev/data-server: "true"
        sdcio.dev/schema-server: "true"
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      serviceAccountName: data-server-controller
      containers:
      - name: controller
        image: ghcr.io/sdcio/config-server-controller:v0.0.56
        imagePullPolicy: Always
        command:
        - /app/controller
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: "NODE_NAME"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: "NODE_IP"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: LOCAL_DATASERVER
          value: "true"
        - name: METRIC_PORT
          value: "8443"
        - name: SDC_DATA_SERVER
          value: data-server.default.svc.cluster.local:56000
        - name: KUBE_FEATURE_WatchListClient
          value: "false"
        - name: ENABLE_SCHEMA
          value: "true"
        - name: ENABLE_SUBSCRIPTION
          value: "true"
        - name: ENABLE_TARGET
          value: "true"
        - name: ENABLE_TARGETCONFIG
          value: "true"
        - name: ENABLE_TARGETDATASTORE
          value: "true"
        - name: ENABLE_TARGETRECOVERYCONFIG
          value: "true"
        - name: PPROF_PORT
          value: "8081"
        - name: REVERTIVE
          value: "true"
        volumeMounts:
        - name: schema-store
          mountPath: /schemas
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 250m
            memory: 64Mi
      - name: data-server
        image: ghcr.io/sdcio/data-server:v0.0.68
        imagePullPolicy: Always
        command:
        - /app/data-server
        args:
        - "--config=/config/data-server.yaml"
        ports:
        - name: data-service
          containerPort: 56000
        volumeMounts:
        - name: data-server-config
          mountPath: /config
        - name: cache
          mountPath: /cached/caches
        - name: schema-db
          mountPath: /schemadb
        - name: schema-store
          mountPath: /schemas
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 250m
            memory: 64Mi
      volumes:
      - name: data-server-config
        configMap:
          name: data-server
      - name: cache
        emptyDir:
          sizeLimit: 10Gi
      - name: schema-db # persistent schema obj from the parsed yang files
        persistentVolumeClaim:
          claimName: pvc-schema-db
      - name: schema-store # yang file from git
        persistentVolumeClaim:
          claimName: pvc-schema-store
---
