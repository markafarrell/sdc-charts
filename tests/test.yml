# Source: sdc/templates/configmap-data-server.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-server
  namespace: default
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
data:
  data-server.yaml: |
    grpc-server:
      schema-server:
        enabled: true
        schemas-directory: ./schemas

      data-server:
        max-candidates: 16

      max-recv-msg-size: 25165824 # 24 * 1024 * 1024 (24MB)

    datastores: # this specifies MAIN datastores

    schema-store:
      # type is either memory or persistent (default)
      type: persistent
      path: "/schemadb"

    cache:
      type: local
      store-type: badgerdb
      dir: "/cached/caches"

    prometheus:
      address: ":56090"
