apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: default
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/component: controller
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      
      app.kubernetes.io/name: sdc
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        
        app.kubernetes.io/name: sdc
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: controller
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      serviceAccountName: controller
      containers:
      - name: controller
        image: ghcr.io/sdcio/config-server-controller:v0.0.56
        imagePullPolicy: Always
        command:
        - /app/controller
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: "NODE_NAME"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: "NODE_IP"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: METRIC_PORT
          value: "8443"
        - name: KUBE_FEATURE_WatchListClient
          value: "false"
        - name: ENABLE_CONFIGSET
          value: "true"
        - name: ENABLE_DISCOVERYRULE
          value: "true"
        - name: ENABLE_ROLLOUT
          value: "true"
        - name: ENABLE_WORKSPACE
          value: "true"
        - name: PPROF_PORT
          value: "8081"
        volumeMounts:
        #- name: schema-store
        #  mountPath: /schemas
        - name: workspace-store
          mountPath: /workspace
          
        - mountPath: /etc/ssl/certs/additional-ca-certs.pem
          name: additional-ca-certs
          readOnly: true
          subPath: ca.crt
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 250m
            memory: 128Mi
      volumes:
      #- name: schema-store # yang file from git
      #  persistentVolumeClaim:
      #    claimName: pvc-schema-store
      - name: workspace-store # git workspace
        persistentVolumeClaim:
          claimName: pvc-workspace-store
        
      - name: additional-ca-certs
        secret:
          optional: true
          secretName: additional-ca-certs
