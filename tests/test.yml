# Source: sdc/templates/allow-metrics-traffic.yaml
# This NetworkPolicy allows ingress traffic
# with Pods running in the monitoring namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-traffic
  namespace: default
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
spec:
  podSelector:
    matchLabels:
      
      app.kubernetes.io/name: sdc
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: sdc-controller
  policyTypes:
    - Ingress
  ingress:
    # This allows ingress traffic from any pod within the monitoring namespace on port 8443
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring # Select namespace with name monitoring
      ports:
        - port: 8443
          protocol: TCP
    - from:
        - podSelector: {}
