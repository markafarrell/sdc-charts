# Source: sdc/templates/deployment-apiserver.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: default
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/component: api-server
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      
      app.kubernetes.io/name: sdc
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: api-server
  template:
    metadata:
      labels:
        
        app.kubernetes.io/name: sdc
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: api-server
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      serviceAccountName: api-server
      containers:
      - name: api-server
        image: ghcr.io/sdcio/config-server-api-server:v0.0.56
        imagePullPolicy: Always
        command:
        - /app/api-server
        args:
        - "--tls-cert-file=/apiserver.local.config/certificates/tls.crt"
        - "--tls-private-key-file=/apiserver.local.config/certificates/tls.key"
        #- "--feature-gates=APIPriorityAndFairness=false"
        - "--audit-log-path=-"
        - "--audit-log-maxage=0"
        - "--audit-log-maxbackup=0"
        - "--secure-port=6443"
        ports:
        - name: api-service
          containerPort: 6443
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: "NODE_NAME"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: "NODE_IP"
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: METRIC_PORT
          value: "8443"
        - name: SDC_DATA_SERVER
          value: data-server.default.svc.cluster.local:56000
        - name: KUBE_FEATURE_WatchListClient
          value: "false"
        volumeMounts:
        - name: api-server-certs
          mountPath: /apiserver.local.config/certificates
          readOnly: true
        - name: config-store
          mountPath: /config
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 250m
            memory: 128Mi
      volumes:
      - name: api-server-certs
        secret:
          secretName: api-server-cert
      - name: config-store
        persistentVolumeClaim:
          claimName: pvc-config-store
---
