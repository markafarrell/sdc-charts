# Source: sdc/templates/allow-apiserver-extension-traffic.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    helm.sh/chart: sdc-0.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: sdc
    app.kubernetes.io/name: sdc
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/component: api-server
  name: allow-traffic-to-apiserver-extension
  namespace: default
spec:
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0 # Can be made more restrictive by only allowing from control plane node IPs
      ports:
        - port: api-service
          protocol: TCP
  podSelector:
    matchLabels:
      
      app.kubernetes.io/name: sdc
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: api-server
  policyTypes:
    - Ingress
